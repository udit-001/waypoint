# GoReleaser config for Waypoint.
# Docs: https://goreleaser.com
#
# Local dry-run:   goreleaser release --snapshot --clean
# Validate config:  goreleaser check
# Full release:     triggered by `git tag v0.x.x && git push --tags`
#
# Publishing targets that need external repos + secrets (Homebrew tap,
# Scoop bucket, winget) are commented out below — uncomment after creating
# the corresponding repos and setting the PAT secrets in GitHub.

version: 2

project_name: waypoint

# Run before any build: install go-winres and generate Windows PE resource
# metadata (.syso) so the .exe carries company/product name, version, and a
# DPI-aware manifest. AV heuristics treat absence of PE metadata as suspicion.
before:
  hooks:
    - go install github.com/tc-hib/go-winres@latest
    - ./scripts/gen-winres.sh {{ .Version }}

builds:
  - id: waypoint
    main: ./cmd/waypoint
    binary: waypoint
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/udit-001/waypoint/internal/version.Version={{.Version}}
      - -X github.com/udit-001/waypoint/internal/version.Commit={{.Commit}}
      - -X github.com/udit-001/waypoint/internal/version.Date={{.Date}}
    mod_timestamp: '{{ .CommitTimestamp }}'

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - docs/architecture.md
      - docs/cli.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ incpatch .Version }}-next'

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'
      - '^ci:'
      - 'Merge pull request'
      - 'Merge branch'

release:
  github:
    owner: udit-001
    name: waypoint
  prerelease: auto
  name_template: 'v{{ .Version }}'

# Cosign keyless signing of checksums.txt (uses GitHub OIDC, no long-lived keys).
# Requires `permissions: id-token: write` on the release workflow.
signs:
  - id: cosign
    cmd: cosign
    signature: '${artifact}.sigstore.json'
    args:
      - sign-blob
      - --bundle=${artifact}.sigstore.json
      - ${artifact}
      - --yes
    artifacts: checksum

# Linux packages (.deb, .rpm) attached to the GitHub release.
nfpms:
  - id: waypoint
    package_name: waypoint
    vendor: udit-001
    homepage: https://github.com/udit-001/waypoint
    maintainer: Udit <23015406+udit-001@users.noreply.github.com>
    description: A job application tracker with a Go backend and Svelte frontend
    license: MIT
    formats:
      - deb
      - rpm
    file_name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'

