name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: latest
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build frontend
        run: |
          cd web
          pnpm install --frozen-lockfile
          pnpm build

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Build
        run: |
          ext=""
          if [ "${{ matrix.os }}" = "windows" ]; then ext=".exe"; fi
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} CGO_ENABLED=0 \
            go build -ldflags="-s -w -X github.com/SwatiBio/waypoint/internal/version.Version=${GITHUB_REF_NAME#v}" \
            -o "waypoint${ext}" ./cmd/waypoint/

      - name: Archive
        run: |
          tag="${{ github.ref_name }}"
          ext=""
          if [ "${{ matrix.os }}" = "windows" ]; then ext=".exe"; fi
          name="waypoint_${tag}_${{ matrix.os }}_${{ matrix.arch }}"
          if [ "${{ matrix.os }}" = "windows" ]; then
            zip -9 "${name}.zip" "waypoint${ext}"
            echo "artifact=${name}.zip" >> $GITHUB_ENV
          else
            tar czf "${name}.tar.gz" "waypoint${ext}"
            echo "artifact=${name}.tar.gz" >> $GITHUB_ENV
          fi

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ env.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: Generate changelog
        run: |
          prev=$(git tag --sort=-creatordate | head -2 | tail -1)
          if [ -z "$prev" ]; then
            git log --format="- %s" > changelog.md
          else
            git log --format="- %s" "$prev..${{ github.ref_name }}" > changelog.md
          fi

      - name: Create release and upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES=$(cat changelog.md)
          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            gh release edit "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --notes "$NOTES"
          else
            gh release create "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --notes "$NOTES"
          fi
          find artifacts -type f -exec gh release upload "${{ github.ref_name }}" {} \; 2>/dev/null || true
