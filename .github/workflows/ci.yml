name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Download Go dependencies
        run: go mod download

      - name: Gofmt
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: golangci-lint
        # Install from source via `go install` so the linter is built with the
        # same Go toolchain (1.25.10) as the code — prebuilt binaries (v1.64.8,
        # built with Go 1.24) can't analyze Go 1.25 targets.
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run ./...

      - name: Test
        # modernc.org/sqlite is pure-Go (no CGO) — runs on stock ubuntu-latest.
        run: go test -race ./...

      - name: Build
        run: go build ./...

      - name: Frontend tests
        run: pnpm test
        working-directory: web
